name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 pandas openpyxl python-docx lxml

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --icon=icons/app.ico `
            --add-data "icons;icons" `
            --name "KarlsLetterMaker" `
            main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KarlsLetterMaker
          path: dist/KarlsLetterMaker.exe
          retention-days: 30